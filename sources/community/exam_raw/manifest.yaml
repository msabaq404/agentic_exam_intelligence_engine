name: exam_raw
version: "0.1.0"
dsl_version: 3
description: "Query raw parquet exports of source documents, pages, and chunks from the local coral_data directory."
backend: parquet
tables:
  - name: pdf_documents
    description: "One row per uploaded PDF document with source metadata exported from ingestion.sources."
    source:
      location: file:///C:/Users/Sabaq/Projects/agentic_exam_intelligence_engine/coral_data/
      glob: "ingestion_sources.parquet"
    columns: []

  - name: pdf_pages
    description: "One row per PDF page exported from ingestion.pdf_pages."
    source:
      location: file:///C:/Users/Sabaq/Projects/agentic_exam_intelligence_engine/coral_data/
      glob: "ingestion_pdf_pages.parquet"
    columns: []

  - name: pdf_chunks
    description: "Source chunks exported from ingestion.pdf_chunks."
    source:
      location: file:///C:/Users/Sabaq/Projects/agentic_exam_intelligence_engine/coral_data/
      glob: "ingestion_pdf_chunks.parquet"
    columns: []

test_queries:
  - "SELECT source_id, source_kind, filename FROM exam_raw.pdf_documents LIMIT 1"
  - "SELECT page_id, source_id, page_number FROM exam_raw.pdf_pages LIMIT 1"
  - "SELECT chunk_id, source_id, chunk_kind FROM exam_raw.pdf_chunks LIMIT 1"
