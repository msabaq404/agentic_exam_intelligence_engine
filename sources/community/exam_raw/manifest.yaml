name: exam_raw
version: "0.1.0"
description: "Coral source exposing raw PDF documents, pages, and text chunks from the persistent ingestion database. Use this source to query uploaded educational documents, page text, and chunked source content through SQL before enrichment."
inputs:
  PGHOST:
    kind: variable
    hint: "PostgreSQL host for the ingestion database (example: localhost)."
    required: true
  PGPORT:
    kind: variable
    hint: "PostgreSQL port for the ingestion database (example: 5432)."
    required: true
  PGDATABASE:
    kind: variable
    hint: "PostgreSQL database name containing the ingestion tables (example: postgres)."
    required: true
  PGUSER:
    kind: variable
    hint: "PostgreSQL user with read access to ingestion tables (example: postgres)."
    required: true
  PGPASSWORD:
    kind: secret
    hint: "PostgreSQL password for the ingestion database user."
    required: true
backend:
  kind: postgres
  host: "{{input.PGHOST}}"
  port: "{{input.PGPORT}}"
  database: "{{input.PGDATABASE}}"
  user: "{{input.PGUSER}}"
  password: "{{input.PGPASSWORD}}"
tables:
  - table_name: pdf_documents
    description: "One row per uploaded PDF document with explicit source kind and coverage metadata."
    columns:
      - name: source_id
        data_type: Utf8
      - name: source_kind
        data_type: Utf8
      - name: source_subtype
        data_type: Utf8
      - name: subject
        data_type: Utf8
      - name: publication_year
        data_type: Int64
      - name: coverage_start_year
        data_type: Int64
      - name: coverage_end_year
        data_type: Int64
      - name: coverage_years_json
        data_type: Utf8
      - name: upload_timestamp
        data_type: Timestamp
      - name: checksum
        data_type: Utf8
      - name: owner_user_id
        data_type: Utf8
      - name: source_uri
        data_type: Utf8
      - name: filename
        data_type: Utf8

  - table_name: pdf_pages
    description: "One row per PDF page. Text should be pre-extracted and stored in `page_text`."
    columns:
      - name: page_id
        data_type: Utf8
      - name: source_id
        data_type: Utf8
      - name: page_number
        data_type: Int64
      - name: page_text
        data_type: Utf8
      - name: ocr_confidence
        data_type: Float64

  - table_name: pdf_chunks
    description: "Question candidates or normalized source blocks extracted from pages. These are staging rows used to reconstruct exact PYQ structure before enrichment writes to the final exam tables."
    columns:
      - name: chunk_id
        data_type: Utf8
      - name: page_id
        data_type: Utf8
      - name: source_id
        data_type: Utf8
      - name: chunk_order
        data_type: Int64
      - name: chunk_text
        data_type: Utf8
      - name: chunk_kind
        data_type: Utf8
      - name: extracted_entities_json
        data_type: Utf8

test_queries:
  - "SELECT source_id, source_kind, publication_year, coverage_start_year, coverage_end_year FROM pdf_documents ORDER BY upload_timestamp DESC LIMIT 10"
  - "SELECT page_id, source_id, page_number FROM pdf_pages ORDER BY source_id, page_number LIMIT 50"
  - "SELECT chunk_id, page_id, chunk_kind FROM pdf_chunks LIMIT 50"
