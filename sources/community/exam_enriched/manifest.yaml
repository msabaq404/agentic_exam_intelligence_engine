name: exam_enriched
version: "0.1.0"
dsl_version: 3
description: "Query enriched exam intelligence parquet exports from the local coral_data directory."
backend: parquet
tables:
  - name: exam_questions
    description: "Structured PYQ question records exported from the enrichment pipeline."
    source:
      location: file:///C:/Users/Sabaq/Projects/agentic_exam_intelligence_engine/coral_data/
      glob: "exam_questions.parquet"
    columns: []

  - name: exam_textbook_chunks
    description: "Textbook chunks and semantic annotations exported from the enrichment pipeline."
    source:
      location: file:///C:/Users/Sabaq/Projects/agentic_exam_intelligence_engine/coral_data/
      glob: "exam_textbook_chunks.parquet"
    columns: []

  - name: exam_chapter_links
    description: "Links between enriched questions and textbook chunks with rationale."
    source:
      location: file:///C:/Users/Sabaq/Projects/agentic_exam_intelligence_engine/coral_data/
      glob: "exam_chapter_links.parquet"
    columns: []

  - name: embeddings
    description: "Vector embeddings exported from ingestion.embeddings, including inferred source_kind."
    source:
      location: file:///C:/Users/Sabaq/Projects/agentic_exam_intelligence_engine/coral_data/
      glob: "ingestion_embeddings.parquet"
    columns: []

test_queries:
  - "SELECT question_id, topic, importance_score FROM exam_enriched.exam_questions LIMIT 1"
  - "SELECT chunk_id, chapter, main_concept FROM exam_enriched.exam_textbook_chunks LIMIT 1"
  - "SELECT embedding_id, chunk_id, source_kind FROM exam_enriched.embeddings LIMIT 1"
